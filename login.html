<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title data-i18n="meta.login">Bejelentkezés</title>
    <script src="i18n.js"></script>
</head>
<body>

    <button type="button" id="bpmapLangBtn" class="bpmap-lang-btn">English</button>

<main class="card">
    <h1 data-i18n="auth.loginTitle">Bejelentkezés</h1>
    <div id="authToast" class="auth-toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <label for="email" data-i18n="auth.email">Email</label>
    <input id="email" type="text" autocomplete="email">

    <label for="password" data-i18n="auth.password">Jelszó</label>
    <input id="password" type="password" autocomplete="current-password">

    <div class="row">
        <button id="loginBtn" type="button" data-i18n="auth.loginBtn">Belépés</button>
    </div>

    <p class="signup-p">
        <span data-i18n="auth.noAccount">Nincs fiókod?</span>
        <a href="sign.html" id="signupLink" data-i18n="auth.signupLink">Regisztrálj itt!</a>
    </p>
</main>

<script src="login.js"></script>

</body>
</html>
