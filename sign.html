<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sign.css">
    <title data-i18n="meta.signup">Regisztráció</title>
    <script src="i18n.js"></script>
</head>
<body>

    <button type="button" id="bpmapLangBtn" class="bpmap-lang-btn">English</button>

<main class="card">
    <h1 data-i18n="auth.signupTitle">Regisztráció</h1>
    <div id="authToast" class="auth-toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <label for="email" data-i18n="auth.email">Email</label>
    <input id="email" type="text" autocomplete="email">

    <label for="password" data-i18n="auth.password">Jelszó</label>
    <input id="password" type="password" autocomplete="new-password">

    <label for="confirm" data-i18n="auth.confirm">Jelszó megerősítése</label>
    <input id="confirm" type="password" autocomplete="new-password">

    <div class="row">
        <button id="registerBtn" type="button" data-i18n="auth.registerBtn">Regisztráció</button>
    </div>
</main>

<script src="sign.js"></script>

</body>
</html>
